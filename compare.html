<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ReviewLens — Product Comparison</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 0;
    }

    /* ── Header ── */
    .rl-cmp-header {
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      border-bottom: 1px solid rgba(99,102,241,0.15);
      padding: 20px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
    }
    .rl-cmp-header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .rl-cmp-logo-mark {
      width: 36px; height: 36px;
      border-radius: 10px;
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 900; color: #fff;
    }
    .rl-cmp-title {
      font-size: 18px; font-weight: 800; color: #fff;
    }
    .rl-cmp-title span {
      display: block; font-size: 11px; font-weight: 400;
      color: #64748b; letter-spacing: 0.3px; margin-top: 2px;
    }
    .rl-cmp-actions {
      display: flex; gap: 10px; align-items: center;
    }
    .rl-cmp-count {
      font-size: 12px; color: #64748b;
      background: rgba(255,255,255,0.05);
      padding: 5px 12px; border-radius: 20px;
    }
    .rl-cmp-clear {
      padding: 7px 16px; border-radius: 8px;
      background: rgba(248,113,113,0.1);
      color: #f87171;
      border: 1px solid rgba(248,113,113,0.2);
      font-size: 12px; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
      font-family: inherit;
    }
    .rl-cmp-clear:hover {
      background: rgba(248,113,113,0.2);
    }

    /* ── Empty state ── */
    .rl-cmp-empty {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 80px 24px; text-align: center;
    }
    .rl-cmp-empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.6; }
    .rl-cmp-empty-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; color: #94a3b8; }
    .rl-cmp-empty-text { font-size: 13px; color: #64748b; line-height: 1.6; max-width: 380px; }

    /* ── Grid ── */
    .rl-cmp-grid {
      display: flex;
      gap: 0;
      overflow-x: auto;
      padding: 24px 24px 24px;
      min-height: calc(100vh - 80px);
      align-items: flex-start;
    }

    /* ── Product column ── */
    .rl-cmp-col {
      min-width: 280px;
      max-width: 320px;
      flex: 1 0 280px;
      background: #1e293b;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      overflow: hidden;
      margin: 0 8px;
      animation: rl-cmp-fade-in 0.4s ease both;
    }
    .rl-cmp-col:nth-child(1) { animation-delay: 0.05s; }
    .rl-cmp-col:nth-child(2) { animation-delay: 0.10s; }
    .rl-cmp-col:nth-child(3) { animation-delay: 0.15s; }
    .rl-cmp-col:nth-child(4) { animation-delay: 0.20s; }
    .rl-cmp-col:nth-child(5) { animation-delay: 0.25s; }

    @keyframes rl-cmp-fade-in {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Product header (image + name) ── */
    .rl-cmp-product-header {
      padding: 16px;
      background: rgba(255,255,255,0.02);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      text-align: center;
    }
    .rl-cmp-img {
      width: 120px; height: 120px;
      object-fit: contain;
      border-radius: 10px;
      background: #fff;
      margin: 0 auto 10px;
      display: block;
    }
    .rl-cmp-img-placeholder {
      width: 120px; height: 120px;
      border-radius: 10px;
      background: rgba(255,255,255,0.05);
      margin: 0 auto 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 32px; color: #475569;
    }
    .rl-cmp-name {
      font-size: 13px; font-weight: 600; color: #e2e8f0;
      line-height: 1.4;
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .rl-cmp-name a {
      color: #e2e8f0; text-decoration: none;
    }
    .rl-cmp-name a:hover { color: #818cf8; }
    .rl-cmp-price {
      font-size: 16px; font-weight: 800; color: #4ade80;
      margin-top: 6px;
    }

    /* ── Trust score in column ── */
    .rl-cmp-trust {
      padding: 16px;
      text-align: center;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .rl-cmp-trust-score {
      font-size: 44px; font-weight: 900;
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }
    .rl-cmp-trust-label {
      font-size: 10px; font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 4px;
    }
    .rl-cmp-rating-row {
      display: flex; justify-content: center; align-items: center;
      gap: 8px; margin-top: 8px;
      font-size: 13px;
    }
    .rl-cmp-star { color: #fbbf24; }
    .rl-cmp-total-ratings { font-size: 11px; color: #64748b; }

    /* ── Verdict badge ── */
    .rl-cmp-verdict {
      display: inline-block;
      padding: 3px 12px; border-radius: 20px;
      font-size: 11px; font-weight: 700;
      text-transform: capitalize;
      margin-top: 8px;
    }
    .rl-cmp-verdict-accurate   { background: rgba(74,222,128,0.12);  color: #4ade80; border: 1px solid rgba(74,222,128,0.25); }
    .rl-cmp-verdict-inflated   { background: rgba(248,113,113,0.12); color: #f87171; border: 1px solid rgba(248,113,113,0.25); }
    .rl-cmp-verdict-deflated   { background: rgba(96,165,250,0.12);  color: #60a5fa; border: 1px solid rgba(96,165,250,0.25); }
    .rl-cmp-verdict-suspicious { background: rgba(167,139,250,0.12); color: #a78bfa; border: 1px solid rgba(167,139,250,0.25); }
    .rl-cmp-verdict-caution    { background: rgba(251,191,36,0.12);  color: #fbbf24; border: 1px solid rgba(251,191,36,0.25); }
    .rl-cmp-verdict-unknown    { background: rgba(255,255,255,0.06); color: #94a3b8; }

    /* ── Emotional pulse bars ── */
    .rl-cmp-pulse {
      padding: 12px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .rl-cmp-section-title {
      font-size: 9.5px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.8px;
      color: #64748b; margin-bottom: 8px;
    }
    .rl-cmp-bar-row { margin-bottom: 5px; }
    .rl-cmp-bar-label {
      display: flex; justify-content: space-between;
      font-size: 11px; color: #94a3b8; margin-bottom: 3px;
    }
    .rl-cmp-bar-pct { font-weight: 700; color: #e2e8f0; }
    .rl-cmp-bar-track {
      background: rgba(255,255,255,0.06);
      border-radius: 3px; height: 5px; overflow: hidden;
    }
    .rl-cmp-bar {
      height: 100%; border-radius: 3px;
      transition: width 0.8s cubic-bezier(0.34,1.56,0.64,1);
    }
    .rl-cmp-bar-pos { background: linear-gradient(90deg, #059669, #34d399); }
    .rl-cmp-bar-neu { background: linear-gradient(90deg, #d97706, #fbbf24); }
    .rl-cmp-bar-neg { background: linear-gradient(90deg, #dc2626, #f87171); }

    /* ── Lists (concerns, praises, good for, avoid if) ── */
    .rl-cmp-list-section {
      padding: 12px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .rl-cmp-list {
      list-style: none; padding: 0;
    }
    .rl-cmp-list li {
      font-size: 11.5px; color: #94a3b8;
      line-height: 1.45;
      padding: 3px 0;
      display: flex; align-items: flex-start; gap: 6px;
    }
    .rl-cmp-list li::before {
      flex-shrink: 0;
      font-weight: 700;
      font-size: 11px;
    }
    .rl-cmp-concerns li::before { content: "\2013"; color: #f87171; }
    .rl-cmp-praises  li::before { content: "+"; color: #34d399; }
    .rl-cmp-good-for li::before { content: "\2713"; color: #34d399; }
    .rl-cmp-avoid-if li::before { content: "\2717"; color: #f87171; }
    .rl-cmp-list-empty {
      font-size: 11px; color: #475569; font-style: italic;
    }

    /* ── Remove button ── */
    .rl-cmp-remove-wrap { padding: 12px 16px; }
    .rl-cmp-remove {
      width: 100%;
      padding: 8px 0;
      border-radius: 8px;
      background: rgba(248,113,113,0.06);
      color: #f87171;
      border: 1px solid rgba(248,113,113,0.15);
      font-size: 12px; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
      font-family: inherit;
    }
    .rl-cmp-remove:hover {
      background: rgba(248,113,113,0.15);
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { height: 6px; }
    ::-webkit-scrollbar-track { background: rgba(255,255,255,0.02); }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }

    /* ── Best-in-class highlight ── */
    .rl-cmp-best {
      box-shadow: 0 0 0 2px rgba(74,222,128,0.4), 0 8px 32px rgba(74,222,128,0.1);
    }
    .rl-cmp-best-badge {
      position: absolute; top: -1px; right: 16px;
      padding: 3px 10px 5px;
      background: linear-gradient(135deg, #059669, #34d399);
      color: #fff; font-size: 9px; font-weight: 800;
      text-transform: uppercase; letter-spacing: 0.5px;
      border-radius: 0 0 8px 8px;
    }
    .rl-cmp-col { position: relative; }
  </style>
</head>
<body>

  <div class="rl-cmp-header">
    <div class="rl-cmp-header-left">
      <div class="rl-cmp-logo-mark">RL</div>
      <div class="rl-cmp-title">Product Comparison <span id="rl-cmp-subtitle">Compare products side by side</span></div>
    </div>
    <div class="rl-cmp-actions">
      <span class="rl-cmp-count" id="rl-cmp-count">0 products</span>
      <button class="rl-cmp-clear" id="rl-cmp-clear">Clear All</button>
    </div>
  </div>

  <div id="rl-cmp-container"></div>

  <script src="compare-page.js"></script>
</body>
</html>
